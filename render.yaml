services:
  - type: web
    name: klaus-md
    env: node
    plan: free
    buildCommand: npm run build:obf
    startCommand: node dist/start.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_MODE
        value: bot
      - key: MODE
        value: public
      - key: PREFIX
        value: .
      - key: BOT_NAME
        value: KLAUS MD
      - key: BOT_SOURCE_DIR
        value: /app/source
      - key: PORT
        value: 3000
